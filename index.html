<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodWave — حال خودت رو بزن</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Floating particles -->
  <div id="particles"></div>

  <!-- Main content -->
  <main class="main" id="main">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🌊</span>
        <span class="logo-text">MoodWave</span>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="fa">FA</button>
        <span class="lang-sep">·</span>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="hero-section">
      <div class="hero-inner">
        <p class="hero-subtitle" data-fa="الان چه حالی داری؟" data-en="What's your vibe right now?">الان چه حالی داری؟</p>
        <h1 class="hero-title" data-fa="حالت رو<br>انتخاب کن" data-en="Pick Your<br>Mood">حالت رو<br>انتخاب کن</h1>
        <p class="hero-desc" data-fa="ما یه موزیک کامل برات پیدا می‌کنیم" data-en="We'll find the perfect soundtrack for you">ما یه موزیک کامل برات پیدا می‌کنیم</p>
      </div>
    </section>

    <!-- Mood Grid -->
    <section class="mood-grid-section">
      <div class="mood-grid" id="mood-grid">

        <button class="mood-card" data-mood="happy" style="--mood-color: #FFD700; --mood-glow: #FF8C00;">
          <div class="mood-card-inner">
            <div class="mood-emoji">😄</div>
            <div class="mood-label">
              <span class="mood-fa">شاد</span>
              <span class="mood-en">Happy</span>
            </div>
            <div class="mood-desc-text">
              <span class="mood-fa-desc">خوشحالم، دنیا قشنگه!</span>
              <span class="mood-en-desc">Feeling on top of the world</span>
            </div>
            <div class="mood-ripple"></div>
          </div>
        </button>

        <button class="mood-card" data-mood="sad" style="--mood-color: #4A90D9; --mood-glow: #1a3a6b;">
          <div class="mood-card-inner">
            <div class="mood-emoji">😢</div>
            <div class="mood-label">
              <span class="mood-fa">غمگین</span>
              <span class="mood-en">Sad</span>
            </div>
            <div class="mood-desc-text">
              <span class="mood-fa-desc">دلم گرفته، یه دلداری بده</span>
              <span class="mood-en-desc">Need a little comfort</span>
            </div>
            <div class="mood-ripple"></div>
          </div>
        </button>

        <button class="mood-card" data-mood="energetic" style="--mood-color: #FF3CAC; --mood-glow: #784BA0;">
          <div class="mood-card-inner">
            <div class="mood-emoji">⚡</div>
            <div class="mood-label">
              <span class="mood-fa">پر‌انرژی</span>
              <span class="mood-en">Energetic</span>
            </div>
            <div class="mood-desc-text">
              <span class="mood-fa-desc">آماده‌ام همه چیز رو بزنم هوا</span>
              <span class="mood-en-desc">Ready to take on the world</span>
            </div>
            <div class="mood-ripple"></div>
          </div>
        </button>

        <button class="mood-card" data-mood="calm" style="--mood-color: #00F5A0; --mood-glow: #00D9F5;">
          <div class="mood-card-inner">
            <div class="mood-emoji">🧘</div>
            <div class="mood-label">
              <span class="mood-fa">آروم</span>
              <span class="mood-en">Calm</span>
            </div>
            <div class="mood-desc-text">
              <span class="mood-fa-desc">آروم و ریلکسم، همه چیز خوبه</span>
              <span class="mood-en-desc">At peace with everything</span>
            </div>
            <div class="mood-ripple"></div>
          </div>
        </button>

        <button class="mood-card" data-mood="angry" style="--mood-color: #FF4500; --mood-glow: #8B0000;">
          <div class="mood-card-inner">
            <div class="mood-emoji">😤</div>
            <div class="mood-label">
              <span class="mood-fa">عصبانی</span>
              <span class="mood-en">Angry</span>
            </div>
            <div class="mood-desc-text">
              <span class="mood-fa-desc">عصبیم، باید خالی بشم</span>
              <span class="mood-en-desc">Need to let it all out</span>
            </div>
            <div class="mood-ripple"></div>
          </div>
        </button>

        <button class="mood-card" data-mood="romantic" style="--mood-color: #FF69B4; --mood-glow: #C71585;">
          <div class="mood-card-inner">
            <div class="mood-emoji">💕</div>
            <div class="mood-label">
              <span class="mood-fa">عاشقانه</span>
              <span class="mood-en">Romantic</span>
            </div>
            <div class="mood-desc-text">
              <span class="mood-fa-desc">دلم می‌خواد عاشق بشم</span>
              <span class="mood-en-desc">Feeling that love energy</span>
            </div>
            <div class="mood-ripple"></div>
          </div>
        </button>

      </div>
    </section>

    <!-- Player Section (hidden initially) -->
    <section class="player-section" id="player-section">
      <div class="player-card" id="player-card">
        <div class="player-mood-indicator" id="player-mood-indicator"></div>
        <div class="player-content">
          <div class="player-album-art" id="player-album-art">
            <div class="album-art-inner">
              <div class="vinyl-record" id="vinyl">
                <div class="vinyl-label"></div>
              </div>
            </div>
          </div>
          <div class="player-info">
            <div class="track-mood" id="track-mood-label"></div>
            <div class="track-title" id="track-title"></div>
            <div class="track-desc" id="track-desc"></div>
            <div class="player-progress">
              <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="progress-thumb" id="progress-thumb"></div>
              </div>
              <div class="time-display">
                <span id="time-current">0:00</span>
                <span id="time-total">3:30</span>
              </div>
            </div>
            <div class="player-controls">
              <button class="ctrl-btn" id="btn-prev" title="Previous">⏮</button>
              <button class="ctrl-btn play-btn" id="btn-play" title="Play/Pause">▶</button>
              <button class="ctrl-btn" id="btn-next" title="Next">⏭</button>
              <button class="ctrl-btn vol-btn" id="btn-vol" title="Volume">🔊</button>
            </div>
            <button class="change-mood-btn" id="change-mood-btn">
              <span data-fa="تغییر حال" data-en="Change Mood">تغییر حال</span>
            </button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
